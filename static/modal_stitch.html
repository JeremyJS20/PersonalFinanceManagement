<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d968b",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Background Transactions Page (Mockup) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 grayscale-[0.5]">
<div class="max-w-5xl mx-auto p-8">
<header class="flex justify-between items-center mb-10">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<h1 class="text-2xl font-bold">FinanceFlow</h1>
</div>
</header>
<div class="grid grid-cols-3 gap-6 mb-8">
<div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-primary/10"></div>
<div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-primary/10"></div>
<div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-primary/10"></div>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-primary/10 h-[600px] p-6">
<div class="space-y-4">
<div class="h-12 bg-slate-100 dark:bg-slate-700 rounded-lg w-full"></div>
<div class="h-12 bg-slate-100 dark:bg-slate-700 rounded-lg w-full"></div>
<div class="h-12 bg-slate-100 dark:bg-slate-700 rounded-lg w-full"></div>
<div class="h-12 bg-slate-100 dark:bg-slate-700 rounded-lg w-full"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Modal Header -->
<header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined text-xl">add_card</span>
</div>
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100">Add New Transaction</h2>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-500">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Modal Body -->
<div class="p-6 space-y-5">
<!-- Amount Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
<input class="w-full pl-8 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-lg font-medium" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Date & Account Row -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Transaction Date</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm" type="date"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
<span class="material-symbols-outlined text-xl">calendar_today</span>
</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Account</label>
<select class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm appearance-none">
<option>Main Checking</option>
<option>Savings Account</option>
<option>Credit Card (Gold)</option>
<option>Cash Wallet</option>
</select>
</div>
</div>
<!-- Category Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Category</label>
<select class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm appearance-none">
<optgroup label="Essential">
<option>Housing &amp; Rent</option>
<option>Groceries</option>
<option>Utilities</option>
</optgroup>
<optgroup label="Lifestyle">
<option>Dining Out</option>
<option>Entertainment</option>
<option>Shopping</option>
</optgroup>
<optgroup label="Other">
<option>Income</option>
<option>Transfer</option>
<option>Uncategorized</option>
</optgroup>
</select>
</div>
<!-- Description Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Description</label>
<textarea class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm resize-none" placeholder="What was this for?" rows="2"></textarea>
</div>
<!-- Attachment (Optional Extension) -->
<div class="flex items-center gap-2 text-primary hover:text-primary/80 cursor-pointer transition-colors w-fit">
<span class="material-symbols-outlined text-lg">attach_file</span>
<span class="text-sm font-medium">Add receipt photo</span>
</div>
</div>
<!-- Modal Footer -->
<footer class="px-6 py-6 bg-slate-50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800 flex flex-col-reverse sm:flex-row gap-3">
<button class="flex-1 px-6 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-700 dark:text-slate-300 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                    Cancel
                </button>
<button class="flex-[2] px-6 py-3 bg-primary hover:bg-primary/90 text-white rounded-lg font-semibold text-sm shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">check</span>
                    Add Transaction
                </button>
</footer>
</div>
</div>
</body></html>
